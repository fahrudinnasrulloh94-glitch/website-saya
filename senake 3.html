<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Ultimate</title>

<style>
body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family:sans-serif;
}

.container {
    text-align:center;
}

canvas {
    background:black;
    border-radius:12px;
    box-shadow:0 0 25px cyan;
}

.controls {
    margin-top:10px;
}

button {
    padding:8px 15px;
    border:none;
    border-radius:10px;
    margin:3px;
    cursor:pointer;
}

select {
    padding:5px;
    border-radius:5px;
}

/* TOMBOL HP */
.mobile-controls{
    margin-top:15px;
}

.mobile-controls button{
    width:60px;
    height:60px;
    font-size:25px;
    border:none;
    border-radius:15px;
    margin:5px;
    background:#00ffff;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h2 id="score">Skor: 0</h2>
    <h4 id="high">High: 0</h4>

    <canvas id="game" width="400" height="400"></canvas>

    <h2 id="over" style="display:none;color:red;">GAME OVER</h2>

    <!-- TOMBOL HP -->
    <div class="mobile-controls">
        <button onclick="atas()">⬆</button><br>
        <button onclick="kiri()">⬅</button>
        <button onclick="bawah()">⬇</button>
        <button onclick="kanan()">➡</button>
    </div>

    <div class="controls">
        🎨 Warna:
        <select id="colorPicker" onchange="changeColor()">
            <option value="#00ffff">Cyan</option>
            <option value="#00ff00">Hijau</option>
            <option value="#ff0000">Merah</option>
            <option value="#ffff00">Kuning</option>
            <option value="#ff00ff">Ungu</option>
        </select>

        <button onclick="toggleAI()">🤖 AI</button>
        <button onclick="init()">🔄 Restart</button>
    </div>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let snake, food, dx, dy, score, running, color;
let powerUp = null;
let ai = false;

let high = localStorage.getItem("snakeHigh") || 0;
document.getElementById("high").innerText="High: "+high;

// INIT
function init(){
    snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dx=1; dy=0;
    score=0;
    running=true;
    color = document.getElementById("colorPicker").value;
    document.getElementById("score").innerText="Skor: 0";
    document.getElementById("over").style.display="none";
    spawnFood();
}

// FOOD
function spawnFood(){
    food={
        x:Math.floor(Math.random()*20),
        y:Math.floor(Math.random()*20)
    };

    // random power up
    if(Math.random()<0.3){
        powerUp={
            x:Math.floor(Math.random()*20),
            y:Math.floor(Math.random()*20),
            type: Math.random()<0.5 ? "speed" : "slow"
        };
    } else {
        powerUp=null;
    }
}

// COLOR CHANGE
function changeColor(){
    color = document.getElementById("colorPicker").value;
}

// AI MODE
function toggleAI(){
    ai = !ai;
}

// AI GERAK
function moveAI(){
    let head = snake[0];

    if(head.x < food.x) {dx=1; dy=0;}
    else if(head.x > food.x) {dx=-1; dy=0;}
    else if(head.y < food.y) {dx=0; dy=1;}
    else if(head.y > food.y) {dx=0; dy=-1;}
}

// DRAW
function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,400,400);

    snake.forEach((s,i)=>{
        ctx.fillStyle=color;
        ctx.fillRect(s.x*20,s.y*20,18,18);
    });

    // food
    ctx.fillStyle="red";
    ctx.fillRect(food.x*20,food.y*20,18,18);

    // powerup
    if(powerUp){
        ctx.fillStyle = powerUp.type=="speed" ? "cyan" : "orange";
        ctx.fillRect(powerUp.x*20,powerUp.y*20,18,18);
    }
}

// UPDATE
let speed = 120;

function update(){
    if(ai) moveAI();

    let head={x:snake[0].x+dx,y:snake[0].y+dy};

    // tembus
    if(head.x<0) head.x=19;
    if(head.x>19) head.x=0;
    if(head.y<0) head.y=19;
    if(head.y>19) head.y=0;

    // tabrak badan
    for(let i=1;i<snake.length;i++){
        if(head.x==snake[i].x && head.y==snake[i].y){
            running=false;
            document.getElementById("over").style.display="block";

            if(score>high){
                localStorage.setItem("snakeHigh",score);
                document.getElementById("high").innerText="High: "+score;
            }
            return;
        }
    }

    snake.unshift(head);

    // makan food
    if(head.x==food.x && head.y==food.y){
        score+=10;
        document.getElementById("score").innerText="Skor: "+score;
        spawnFood();
    } else {
        snake.pop();
    }

    // ambil powerup
    if(powerUp && head.x==powerUp.x && head.y==powerUp.y){
        if(powerUp.type=="speed"){
            speed = Math.max(60, speed-20);
        } else {
            speed += 20;
        }
        clearInterval(loopID);
        loopID = setInterval(loop,speed);
        powerUp=null;
    }
}

// LOOP
function loop(){
    if(!running) return;
    update();
    draw();
}

// KEYBOARD CONTROL
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft"&&dx!=1){dx=-1;dy=0;}
    if(e.key==="ArrowRight"&&dx!=-1){dx=1;dy=0;}
    if(e.key==="ArrowUp"&&dy!=1){dx=0;dy=-1;}
    if(e.key==="ArrowDown"&&dy!=-1){dx=0;dy=1;}
});

// TOMBOL HP
function kiri(){
    if(dx!=1){
        dx=-1;
        dy=0;
    }
}

function kanan(){
    if(dx!=-1){
        dx=1;
        dy=0;
    }
}

function atas(){
    if(dy!=1){
        dx=0;
        dy=-1;
    }
}

function bawah(){
    if(dy!=-1){
        dx=0;
        dy=1;
    }
}

// START
init();
let loopID = setInterval(loop,speed);
</script>

</body>
</html>
